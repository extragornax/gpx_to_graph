# Deploys madcap_fast to a remote server over SSH on every push to main.
#
# Secrets required (Repo → Settings → Secrets and variables → Actions → Secrets):
#   DEPLOY_HOST    — hostname or IP of the target server (e.g. extragornax.fr)
#   DEPLOY_USER    — SSH username on the target server
#   DEPLOY_SSH_KEY — private SSH key (full contents of an id_ed25519 / id_rsa);
#                    the matching public key must be in the user's authorized_keys
#
# Optional secret:
#   DEPLOY_PORT    — SSH port if not 22
#
# Optional repo variable (Repo → Settings → Secrets and variables → Actions → Variables):
#   DEPLOY_PATH    — path to the repo on the server (default: /srv/madcap_fast)
#
# Prereqs on the server:
#   - The repo is cloned at DEPLOY_PATH and origin points to this GitHub repo.
#   - The deploy user can run `docker compose` without sudo
#     (member of the `docker` group).
#   - `git pull --ff-only` works (no local commits on the deploy host).
#
# Manual run: Actions → Deploy → "Run workflow".

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ vars.DEPLOY_PATH || '/srv/madcap_fast' }}"
            echo "== Pulling latest =="
            git fetch --prune origin
            git checkout main
            git pull --ff-only origin main
            echo "== Blue-green deploy =="
            ./deploy.sh
