services:
  gpx-blue:
    image: gpx-app:latest
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
    volumes:
      - gpx_data:/data

  gpx-green:
    image: gpx-app:latest
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
    volumes:
      - gpx_data:/data

volumes:
  gpx_data:
